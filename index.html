         * Calculates the linear regression (Least Squares) parameters (slope 'm' and       
intercept 'b')
         * for the given set of points.
         * Formula: y = mx + b
         */
        function calculateRegression(pts) {
            if (pts.length < 2) {
                return { m: NaN, b: NaN };
            }

            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;

            for (const p of pts) {
                sumX += p.x;
                sumY += p.y;
                sumXY += p.x * p.y;
                sumX2 += p.x * p.x;
            }

            const N = pts.length;
            // Calculate slope (m)
            const denominator = (N * sumX2 - sumX * sumX);
            if (denominator === 0) {
                return { m: NaN, b: NaN };
            }
            const m = (N * sumXY - sumX * sumY) / denominator;

            // Calculate intercept (b)
            const b = (sumY / N) - (m * (sumX / N));

            return { m, b };
        }
